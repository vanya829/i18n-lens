name: Release

# Triggers on push to main (stable release) or develop (beta pre-release).
# Version is determined automatically from Conventional Commit messages:
#   fix:            → patch  (1.0.0 → 1.0.1)
#   feat:           → minor  (1.0.0 → 1.1.0)
#   BREAKING CHANGE → major  (1.0.0 → 2.0.0)
#   develop branch  → beta pre-release (1.1.0-beta.1)

on:
  push:
    branches: [main, develop]

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    permissions:
      contents: write        # push version commit + create GitHub release
      issues: write          # comment on issues closed by this release
      pull-requests: write   # comment on PRs included in this release
      id-token: write        # npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history required by semantic-release
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
